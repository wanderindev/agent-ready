# Agent Ready — CI stub: generic (secret scan only)
#
# The minimal floor for any repository: a secret scan as the one required check.
# Use this when the project's stack isn't Python or Node, or as a starting point
# you extend with a real test/lint job (copy the `test:` job shape from one of
# the other stubs).
#
# Required-check context this workflow exposes (job `name:` value):
#   - "Secret scan"
#
# IMPORTANT: a job's `name:` IS its branch-protection required-check key.
# Renaming it strands the protected branch's required check forever.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan working tree
        run: gitleaks detect --source . --no-git --redact --verbose --no-banner
